worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Gzip for JSON responses
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=search:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=chat:10m rate=10r/m;

    # --- Upstreams (blue-green ready) ---
    # To switch: update the server line and `nginx -s reload`
    upstream search_api {
        server serve:30001;
        # Blue-green: uncomment the second slot when deploying
        # server serve-green:30002 backup;
        keepalive 16;
    }

    upstream agent_api {
        server agent:30010;
        keepalive 4;
    }

    server {
        listen 80;
        server_name _;

        # Nginx health (internal, for Docker HEALTHCHECK)
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
        }

        # --- Search API ---
        location /health {
            proxy_pass http://search_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /status {
            proxy_pass http://search_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /search {
            limit_req zone=search burst=10 nodelay;

            proxy_pass http://search_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;

            # Search can be slow on first query (model warmup)
            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
        }

        location /tile/ {
            proxy_pass http://search_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Tiles are static images — cache aggressively
            proxy_cache_valid 200 24h;
            add_header Cache-Control "public, max-age=86400";
        }

        # --- Agent (Chat) API ---
        location /chat {
            limit_req zone=chat burst=5 nodelay;

            proxy_pass http://agent_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;

            # SSE streaming — disable buffering
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # CORS preflight for all API paths
        location ~ ^/(search|chat|health|status) {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type, X-Request-ID";
                add_header Access-Control-Max-Age 86400;
                return 204;
            }
        }
    }
}
